{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Bipronath Saha">
    <meta name="description" content="Price Monitoring Dashboard">
    <title>{% block title %}Price Monitor{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --pm-primary: #4f46e5;
            --pm-primary-hover: #4338ca;
            --pm-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --pm-shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.04);
            --pm-shadow-lg: 0 4px 24px rgba(0,0,0,.12);
            --pm-radius: 12px;
            --pm-transition: all .25s cubic-bezier(.4,0,.2,1);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
        }

        .navbar-brand-custom {
            font-weight: 700;
            font-size: 1.35rem;
            background: var(--pm-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .navbar {
            backdrop-filter: blur(12px);
            background: rgba(255,255,255,.85) !important;
            box-shadow: var(--pm-shadow);
        }

        .card {
            border: none;
            border-radius: var(--pm-radius);
            box-shadow: var(--pm-shadow);
            transition: var(--pm-transition);
        }

        .card:hover {
            box-shadow: var(--pm-shadow-lg);
            transform: translateY(-2px);
        }

        .stat-card {
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--pm-gradient);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .btn-pm {
            background: var(--pm-gradient);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-weight: 600;
            transition: var(--pm-transition);
        }

        .btn-pm:hover {
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(79,70,229,.4);
        }

        .btn-outline-pm {
            color: var(--pm-primary);
            border: 2px solid var(--pm-primary);
            border-radius: 8px;
            padding: 8px 18px;
            font-weight: 600;
            background: transparent;
            transition: var(--pm-transition);
        }

        .btn-outline-pm:hover {
            background: var(--pm-primary);
            color: white;
            transform: translateY(-1px);
        }

        .table-container {
            border-radius: var(--pm-radius);
            overflow: hidden;
        }

        .table thead {
            background: var(--pm-gradient);
            color: white;
        }

        .table thead th {
            border: none;
            padding: 14px 16px;
            font-weight: 600;
            font-size: .875rem;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .table tbody tr {
            transition: var(--pm-transition);
        }

        .table tbody tr:hover {
            background: rgba(79,70,229,.04);
        }

        .badge-price-up {
            background: #fef2f2;
            color: #dc2626;
            font-weight: 600;
        }

        .badge-price-down {
            background: #f0fdf4;
            color: #16a34a;
            font-weight: 600;
        }

        .badge-price-target {
            background: #eff6ff;
            color: #2563eb;
            font-weight: 600;
        }

        .search-box {
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            padding: 10px 16px 10px 40px;
            transition: var(--pm-transition);
            background: white;
        }

        .search-box:focus {
            border-color: var(--pm-primary);
            box-shadow: 0 0 0 3px rgba(79,70,229,.15);
            outline: none;
        }

        .search-wrapper {
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .chart-container {
            position: relative;
            height: 350px;
        }

        .fade-in {
            animation: fadeIn .5s ease-out;
        }

        .slide-up {
            animation: slideUp .4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toast-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
        }

        .theme-toggle {
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            border: none;
            background: transparent;
            font-size: 1.2rem;
            transition: var(--pm-transition);
        }

        .theme-toggle:hover {
            background: rgba(79,70,229,.1);
        }

        [data-bs-theme="dark"] body {
            background: #0f172a;
        }

        [data-bs-theme="dark"] .navbar {
            background: rgba(15,23,42,.85) !important;
        }

        [data-bs-theme="dark"] .card {
            background: #1e293b;
        }

        [data-bs-theme="dark"] .search-box {
            background: #1e293b;
            border-color: #334155;
            color: #e2e8f0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state i {
            font-size: 3rem;
            color: #cbd5e1;
            margin-bottom: 16px;
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .6; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand navbar-brand-custom" href="/">
                <i class="bi bi-graph-up-arrow me-2"></i>Price Monitor
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link {% block nav_dashboard %}{% endblock %}" href="/">
                            <i class="bi bi-speedometer2 me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% block nav_add %}{% endblock %}" href="/add/">
                            <i class="bi bi-plus-circle me-1"></i>Add Product
                        </a>
                    </li>
                </ul>
                <div class="d-flex align-items-center gap-2">
                    <a href="/export/" class="btn btn-outline-pm btn-sm" id="exportBtn">
                        <i class="bi bi-download me-1"></i>Export CSV
                    </a>
                    <button class="theme-toggle" id="themeToggle" title="Toggle theme">
                        <i class="bi bi-moon-fill"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="toast-container" id="toastContainer"></div>

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-4 text-muted">
        <small>&copy; 2026 Price Monitor &mdash; Built by Bipronath Saha</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'app.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
